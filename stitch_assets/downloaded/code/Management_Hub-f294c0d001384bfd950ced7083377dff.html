<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alexandria - Management Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#dcc661",
                        "background": "#faf9fa",
                        "on-primary-container": "#e7ebff",
                        "inverse-primary": "#b1c5ff",
                        "surface-container": "#efedee",
                        "surface-container-highest": "#e3e2e3",
                        "outline": "#737784",
                        "surface-bright": "#faf9fa",
                        "inverse-on-surface": "#f2f0f1",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#dfe3e8",
                        "on-surface": "#1b1c1d",
                        "surface-container-low": "#f5f3f4",
                        "primary-fixed-dim": "#b1c5ff",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#e9e8e9",
                        "secondary": "#5a5f63",
                        "primary": "#094cb2",
                        "secondary-fixed-dim": "#c2c7cc",
                        "tertiary-fixed": "#f9e37a",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#211b00",
                        "on-error": "#ffffff",
                        "tertiary-container": "#bfab49",
                        "on-secondary-container": "#606569",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-primary-fixed-variant": "#00419d",
                        "inverse-surface": "#303031",
                        "on-surface-variant": "#434653",
                        "surface-tint": "#2259bf",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#42474b",
                        "secondary-container": "#dfe3e8",
                        "outline-variant": "#c3c6d5",
                        "primary-fixed": "#d9e2ff",
                        "on-secondary-fixed": "#171c20",
                        "surface-variant": "#e3e2e3",
                        "on-primary-fixed": "#001946",
                        "on-background": "#1b1c1d",
                        "on-secondary": "#ffffff",
                        "surface": "#faf9fa",
                        "error-container": "#ffdad6",
                        "primary-container": "#3366cc",
                        "surface-dim": "#dbdadb",
                        "on-tertiary-container": "#4a3f00",
                        "tertiary": "#6d5e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Inter"],
                        "label": ["Public Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Noto Serif', serif; }
        .label-text { font-family: 'Public Sans', sans-serif; }
        .tonal-shift-no-border { border: none !important; }
        .flat-tonal-layering { box-shadow: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl flex items-center justify-center w-full px-6 h-16 tonal-shift-no-border flat-tonal-layering">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="menu_book">menu_book</span>
<h1 class="font-serif italic text-2xl font-bold tracking-tight text-blue-800 dark:text-blue-200">Management</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-6 max-w-md mx-auto space-y-8">
<!-- Header Section -->
<section class="space-y-2">
<h2 class="text-3xl font-headline text-on-surface leading-tight">Office of Records</h2>
<p class="text-on-surface-variant font-body text-sm leading-relaxed">
                Configure the foundational hierarchies and ledger systems for the Alexandria repository.
            </p>
</section>
<!-- Management Tiles (Vertical Hierarchy) -->
<div class="grid grid-cols-1 gap-6">
<!-- Metadata Hierarchy Card -->
<button class="w-full text-left bg-surface-container-lowest p-8 rounded-xl space-y-6 transition-all active:scale-95 group">
<div class="flex justify-between items-start">
<div class="p-3 bg-primary/5 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_tree">account_tree</span>
</div>
<span class="font-label text-xs uppercase tracking-widest text-tertiary font-bold">Category System</span>
</div>
<div class="space-y-2">
<h3 class="text-2xl font-headline text-on-surface">Metadata Hierarchy</h3>
<p class="text-on-surface-variant font-body text-sm">Define and organize product taxonomy for archival retrieval.</p>
</div>
<div class="pt-4 border-t border-outline-variant/15 flex items-center gap-2">
<span class="font-label text-xl font-bold text-primary">24</span>
<span class="font-label text-xs text-on-surface-variant uppercase tracking-wider">Active Categories</span>
</div>
</button>
<!-- Archival Measures Card -->
<button class="w-full text-left bg-surface-container-lowest p-8 rounded-xl space-y-6 transition-all active:scale-95 group">
<div class="flex justify-between items-start">
<div class="p-3 bg-primary/5 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="straighten">straighten</span>
</div>
<span class="font-label text-xs uppercase tracking-widest text-tertiary font-bold text-tertiary">Unit Metrics</span>
</div>
<div class="space-y-2">
<h3 class="text-2xl font-headline text-on-surface">Archival Measures</h3>
<p class="text-on-surface-variant font-body text-sm">Standardize quantitative units for inventory precision.</p>
</div>
<div class="pt-4 border-t border-outline-variant/15 flex items-center gap-2">
<span class="font-label text-xl font-bold text-primary">12</span>
<span class="font-label text-xs text-on-surface-variant uppercase tracking-wider">Defined Units</span>
</div>
</button>
<!-- Exchange Ledger Card -->
<button class="w-full text-left bg-surface-container-lowest p-8 rounded-xl space-y-6 transition-all active:scale-95 group">
<div class="flex justify-between items-start">
<div class="p-3 bg-primary/5 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="currency_exchange">currency_exchange</span>
</div>
<span class="font-label text-xs uppercase tracking-widest text-tertiary font-bold">Ledger Config</span>
</div>
<div class="space-y-2">
<h3 class="text-2xl font-headline text-on-surface">Exchange Ledger</h3>
<p class="text-on-surface-variant font-body text-sm">Manage global currencies and exchange rate valuation.</p>
</div>
<div class="pt-4 border-t border-outline-variant/15 flex items-center gap-2">
<span class="font-label text-xl font-bold text-primary">03</span>
<span class="font-label text-xs text-on-surface-variant uppercase tracking-wider">Active Currencies</span>
</div>
</button>
</div>
<!-- Archival Status Aesthetic Element -->
<div class="flex items-center justify-center py-8 opacity-40">
<div class="h-px w-12 bg-outline-variant"></div>
<span class="mx-4 font-serif italic text-sm">Established MMXXIV</span>
<div class="h-px w-12 bg-outline-variant"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 dark:bg-slate-950/90 backdrop-blur-lg border-none shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-xl">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Inventory</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="point_of_sale">point_of_sale</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Sales</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Patrons</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-700 dark:text-blue-300 bg-blue-50/50 dark:bg-blue-900/20 rounded-xl px-3 py-1 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings_applications">settings_applications</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Management</span>
</a>
</nav>
</body></html>
