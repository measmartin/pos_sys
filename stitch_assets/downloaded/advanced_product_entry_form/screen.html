<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Product - Alexandria</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Inter:wght@400;500;600&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "tertiary-fixed-dim": "#dcc661",
                "background": "#faf9fa",
                "on-primary-container": "#e7ebff",
                "inverse-primary": "#b1c5ff",
                "surface-container": "#efedee",
                "surface-container-highest": "#e3e2e3",
                "outline": "#737784",
                "surface-bright": "#faf9fa",
                "inverse-on-surface": "#f2f0f1",
                "on-primary": "#ffffff",
                "secondary-fixed": "#dfe3e8",
                "on-surface": "#1b1c1d",
                "surface-container-low": "#f5f3f4",
                "primary-fixed-dim": "#b1c5ff",
                "on-tertiary": "#ffffff",
                "surface-container-high": "#e9e8e9",
                "secondary": "#5a5f63",
                "primary": "#094cb2",
                "secondary-fixed-dim": "#c2c7cc",
                "tertiary-fixed": "#f9e37a",
                "on-error-container": "#93000a",
                "error": "#ba1a1a",
                "on-tertiary-fixed": "#211b00",
                "on-error": "#ffffff",
                "tertiary-container": "#bfab49",
                "on-secondary-container": "#606569",
                "on-tertiary-fixed-variant": "#524600",
                "on-primary-fixed-variant": "#00419d",
                "inverse-surface": "#303031",
                "on-surface-variant": "#434653",
                "surface-tint": "#2259bf",
                "surface-container-lowest": "#ffffff",
                "on-secondary-fixed-variant": "#42474b",
                "secondary-container": "#dfe3e8",
                "outline-variant": "#c3c6d5",
                "primary-fixed": "#d9e2ff",
                "on-secondary-fixed": "#171c20",
                "surface-variant": "#e3e2e3",
                "on-primary-fixed": "#001946",
                "on-background": "#1b1c1d",
                "on-secondary": "#ffffff",
                "surface": "#faf9fa",
                "error-container": "#ffdad6",
                "primary-container": "#3366cc",
                "surface-dim": "#dbdadb",
                "on-tertiary-container": "#4a3f00",
                "tertiary": "#6d5e00"
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "fontFamily": {
                "headline": ["Noto Serif"],
                "body": ["Inter"],
                "label": ["Public Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-no-border {
            border: none !important;
        }
        .flat-tonal-layering {
            box-shadow: none !important;
        }
        .input-ghost-border {
            border: 1px solid rgba(115, 119, 132, 0.15);
        }
        .archival-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .archival-scroll::-webkit-scrollbar-thumb {
            background: #dfe3e8;
            border-radius: 10px;
        }
        /* Custom Toggle Style */
        .toggle-checkbox:checked {
          right: 0;
          border-color: #094cb2;
        }
        .toggle-checkbox:checked + .toggle-label {
          background-color: #094cb2;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased selection:bg-primary-fixed">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl flex items-center justify-center h-16 px-6 tonal-shift-no-border">
<div class="absolute left-6">
<button class="p-2 -ml-2 text-primary hover:bg-slate-50 transition-colors rounded-full active:opacity-70 scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-serif text-blue-900 dark:text-slate-100 leading-relaxed font-bold tracking-tight text-xl">Edit Product</h1>
<div class="absolute right-6">
<span class="material-symbols-outlined text-primary" data-icon="more_vert">more_vert</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="pt-24 pb-48 px-6 max-w-lg mx-auto archival-scroll">
<!-- Curate Image Section -->
<section class="mb-10">
<div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden bg-surface-container-low group">
<img alt="Harmonia Headphones" class="w-full h-full object-cover" data-alt="Premium high-fidelity headphones resting on a stack of vintage leather-bound books in a dimly lit study with warm mahogany tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBERc-8WN2TOjudrpDvKczBNjA82d7jJiLcDCKV6s1mvY4_gwXsHP1qT8JgC1RC1vA5vm9lcmQUCPRYa-MzYHN1HRojmXyFydfjAPm2_5-1j5Oa8W_9wcHKYTNu0qGYs9KDhGiB1ogMWYeuS_1r6pYI3I7XAGNa126OvsYlI3k4usdrJq_-wvr16tsFU-dNz3LFT_xPat_j4Zcrmy-5lVIZsxk4r2VOqUbErc-5gXS6FZDJi8a87L5RYm8ygFZWuM5ZTqu0RSWU7z0"/>
<div class="absolute inset-0 bg-black/20 group-hover:bg-black/30 transition-colors flex items-center justify-center">
<button class="bg-white/90 backdrop-blur px-6 py-2.5 rounded-full flex items-center gap-2 text-primary font-label text-sm font-semibold shadow-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-lg" data-icon="photo_camera">photo_camera</span>
                        Curate Primary
                    </button>
</div>
</div>
<div class="mt-3 flex justify-between items-center">
<p class="font-label text-xs text-outline uppercase tracking-widest font-bold">Catalog Entry #2901</p>
<p class="font-label text-xs text-tertiary-container uppercase tracking-widest font-bold">Archived Record</p>
</div>
</section>
<!-- Form Sections -->
<form class="space-y-10">
<!-- Identity Section -->
<div class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs text-outline uppercase tracking-widest font-bold ml-1">Product Code (SKU)</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest input-ghost-border rounded-lg text-secondary focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body" readonly="" type="text" value="ELEC001"/>
</div>
<div class="space-y-2">
<label class="font-label text-xs text-outline uppercase tracking-widest font-bold ml-1">Product Name</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest input-ghost-border rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all font-serif text-lg" type="text" value="Harmonia Headphones"/>
</div>
</div>
<!-- Categorization Section -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label text-xs text-outline uppercase tracking-widest font-bold ml-1">Category</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-3 bg-surface-container-lowest input-ghost-border rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body pr-10">
<option>Electronics</option>
<option>Stationery</option>
<option>Rare Editions</option>
<option>Hardware</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs text-outline uppercase tracking-widest font-bold ml-1">Base Unit</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-3 bg-surface-container-lowest input-ghost-border rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body pr-10">
<option value="1">Piece (PCS)</option>
<option value="2">Kilogram (KG)</option>
<option value="3">Metre (M)</option>
<option value="4">Litre (L)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Description Section -->
<div class="space-y-2">
<label class="font-label text-xs text-outline uppercase tracking-widest font-bold ml-1">Description</label>
<textarea class="w-full px-4 py-3 bg-surface-container-lowest input-ghost-border rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body leading-relaxed" rows="4">Studio-grade acoustic fidelity tailored for the modern scholar. Features active noise cancellation and sustainable leather earcups for extended focus sessions.</textarea>
</div>
<!-- Product Unit Variants Section (New) -->
<div class="pt-4 space-y-6">
<div class="flex items-center justify-between">
<h2 class="font-serif text-lg text-blue-900 font-bold">Unit Variants</h2>
<button class="text-primary flex items-center gap-1 font-label text-xs font-bold uppercase tracking-widest" type="button">
<span class="material-symbols-outlined text-sm" data-icon="add_circle">add_circle</span>
                Add Variant
            </button>
</div>
<div class="space-y-6">
<!-- Variant 1 (Default) -->
<div class="p-5 rounded-2xl bg-surface-container-low border border-outline-variant/10 space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest overflow-hidden relative group cursor-pointer">
<img alt="Unit variant" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBERc-8WN2TOjudrpDvKczBNjA82d7jJiLcDCKV6s1mvY4_gwXsHP1qT8JgC1RC1vA5vm9lcmQUCPRYa-MzYHN1HRojmXyFydfjAPm2_5-1j5Oa8W_9wcHKYTNu0qGYs9KDhGiB1ogMWYeuS_1r6pYI3I7XAGNa126OvsYlI3k4usdrJq_-wvr16tsFU-dNz3LFT_xPat_j4Zcrmy-5lVIZsxk4r2VOqUbErc-5gXS6FZDJi8a87L5RYm8ygFZWuM5ZTqu0RSWU7z0"/>
<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
<span class="material-symbols-outlined text-white text-sm" data-icon="edit">edit</span>
</div>
</div>
<div class="flex flex-col">
<span class="font-label text-[10px] text-outline uppercase font-bold">Base Unit</span>
<span class="font-serif text-base text-on-surface font-bold">Piece (PCS)</span>
</div>
</div>
<div class="flex items-center gap-2">
<span class="font-label text-[10px] text-outline uppercase font-bold">Default</span>
<div class="relative inline-block w-10 mr-2 align-middle select-none">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 right-4" id="default-1" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer" for="default-1"></label>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="font-label text-[10px] text-outline uppercase font-bold ml-1">Conversion Rate</label>
<input class="w-full px-3 py-2 bg-surface-container-lowest input-ghost-border rounded-lg text-sm font-body" readonly="" type="number" value="1"/>
</div>
<div class="space-y-1">
<label class="font-label text-[10px] text-outline uppercase font-bold ml-1">Price (USD)</label>
<input class="w-full px-3 py-2 bg-surface-container-lowest input-ghost-border rounded-lg text-sm font-body font-bold text-primary" type="number" value="250.00"/>
</div>
</div>
</div>
<!-- Variant 2 -->
<div class="p-5 rounded-2xl bg-surface-container-low border border-outline-variant/10 space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center relative group cursor-pointer border-2 border-dashed border-outline-variant/30">
<span class="material-symbols-outlined text-outline" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="flex flex-col flex-1">
<label class="font-label text-[10px] text-outline uppercase font-bold">Select Unit</label>
<select class="bg-transparent border-none p-0 font-serif text-base text-on-surface font-bold focus:ring-0 w-full cursor-pointer">
<option>Box</option>
<option selected="">Pack</option>
<option>Case</option>
<option>Crate</option>
</select>
</div>
</div>
<div class="flex items-center gap-2">
<span class="font-label text-[10px] text-outline uppercase font-bold">Default</span>
<div class="relative inline-block w-10 mr-2 align-middle select-none">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 right-4" id="default-2" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer" for="default-2"></label>
</div>
<button class="p-1 text-error/60 hover:text-error transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="delete">delete</span>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="font-label text-[10px] text-outline uppercase font-bold ml-1">Conversion (to Piece)</label>
<input class="w-full px-3 py-2 bg-surface-container-lowest input-ghost-border rounded-lg text-sm font-body" placeholder="e.g. 6" type="number" value="6"/>
</div>
<div class="space-y-1">
<label class="font-label text-[10px] text-outline uppercase font-bold ml-1">Price (USD)</label>
<input class="w-full px-3 py-2 bg-surface-container-lowest input-ghost-border rounded-lg text-sm font-body font-bold text-primary" placeholder="Price per Pack" type="number" value="1350.00"/>
</div>
</div>
</div>
</div>
</div>
<!-- Metadata/Badges Bento -->
<div class="grid grid-cols-2 gap-3 mt-4">
<div class="p-4 rounded-xl bg-surface-container-low flex flex-col gap-1">
<span class="font-label text-[10px] text-outline uppercase font-bold">Total Stock</span>
<span class="font-serif text-xl text-blue-900 font-bold">142 Units</span>
</div>
<div class="p-4 rounded-xl bg-surface-container-low flex flex-col gap-1">
<span class="font-label text-[10px] text-outline uppercase font-bold">Last Sale</span>
<span class="font-serif text-xl text-blue-900 font-bold">Oct 12</span>
</div>
</div>
</form>
</main>
<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md px-6 py-6 border-t border-outline-variant/10 flex flex-col gap-3 z-50">
<div class="flex gap-3">
<button class="flex-1 py-4 px-6 bg-surface-container-high text-on-surface-variant font-label text-sm font-bold uppercase tracking-widest rounded-full active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="archive">archive</span>
                Archive
            </button>
<button class="flex-[2] py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-label text-sm font-bold uppercase tracking-widest rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="save">save</span>
                Save Changes
            </button>
</div>
<div class="h-1.5 w-1/3 bg-surface-container-highest rounded-full mx-auto mt-2"></div>
</footer>
</body></html>
