<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-no-border {
            border: none !important;
        }

            background-color: #f1f5f9; /* Light slate background per instructions */

    body {

<body class="font-body text-on-surface antialiased min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl sticky top-0 z-50 flex items-center justify-center w-full px-6 h-16 tonal-shift-no-border">
<div class="absolute left-6">
<button class="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:opacity-70 scale-95 transition-transform">
<span class="material-symbols-outlined text-blue-700" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-serif text-blue-900 dark:text-slate-100 leading-relaxed text-xl font-semibold">Enroll Patron</h1>
</header>
<main class="max-w-md mx-auto px-6 pt-8 pb-12">
<!-- Hero Section / Context -->
<div class="mb-8 text-center">
<div class="inline-block px-3 py-1 mb-4 rounded-full bg-tertiary-fixed text-on-tertiary-fixed font-label text-[10px] tracking-widest uppercase font-bold">
                Archival Records
            </div>
<h2 class="font-headline text-3xl text-on-surface font-bold leading-tight">New Entry</h2>
<p class="text-on-surface-variant font-body text-sm mt-2 px-4">Creating a scholarly profile within the Alexandria repository.</p>
</div>
<!-- Form Container -->
<section class="bg-white rounded-xl p-6 shadow-[0_4px_24px_rgba(0,0,0,0.04)] space-y-6">
<!-- Patron Identity -->
<div class="space-y-4">
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Patron Name</label>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all" placeholder="Full legal name" type="text"/>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Phone Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-lg" data-icon="call">call</span>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg pl-11 pr-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Email</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-lg" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg pl-11 pr-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all" placeholder="patron@institution.edu" type="email"/>
</div>
</div>
</div>
</div>
<div class="h-px bg-slate-50"></div>
<!-- Location Details -->
<div class="space-y-4">
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Location (Street)</label>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all" placeholder="123 Archive Way" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">City</label>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all" placeholder="Oxford" type="text"/>
</div>
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Country</label>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all" placeholder="UK" type="text"/>
</div>
</div>
</div>
<div class="h-px bg-slate-50"></div>
<!-- Notes -->
<div class="relative">
<label class="block font-label text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Notes</label>
<textarea class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface placeholder:text-slate-400 font-body transition-all resize-none" placeholder="Special research interests, archival access levels, or biographical details..." rows="4"></textarea>
</div>
</section>
<!-- Form Action -->
<div class="mt-10">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-headline text-lg py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-3">
                Register Patron
                <span class="material-symbols-outlined" data-icon="how_to_reg">how_to_reg</span>
</button>
<p class="text-center text-slate-400 font-label text-[10px] mt-4 tracking-widest uppercase">Validated by Alexandria Protocol v4.2</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 dark:bg-slate-950/90 backdrop-blur-lg rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)] border-none">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Inventory</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="point_of_sale">point_of_sale</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Sales</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-700 dark:text-blue-300 bg-blue-50/50 dark:bg-blue-900/20 rounded-xl px-3 py-1 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Patrons</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-600 tap-highlight-transparent transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings_applications">settings_applications</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Management</span>
</a>
</nav>
</body></html>
